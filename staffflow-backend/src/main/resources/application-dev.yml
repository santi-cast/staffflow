spring:
  datasource:
    url: jdbc:h2:mem:staffflow;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    # Necesario para que data.sql se ejecute DESPUÉS de que Hibernate
    # crea el esquema con ddl-auto: create-drop. Sin esta línea,
    # Spring Boot intenta ejecutar data.sql antes de que existan las tablas
    # y falla con el error literal "Table not found" de H2.
    defer-datasource-initialization: true
  sql:
    init:
      # Ejecutar data.sql siempre que arranque con este perfil.
      # 'always' es necesario porque el datasource es embebido (H2 en memoria).
      mode: always
  h2:
    console:
      enabled: true
      path: /h2-console
  jackson:
    serialization:
      write-dates-as-timestamps: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

staffflow:
  mail:
    from: ${MAIL_USERNAME}
    reset-url: staffflow://reset-password?token=
  jwt:
    # Fallback solo para entorno de desarrollo local. En produccion es OBLIGATORIO definir
    # la variable de entorno JWT_SECRET. El valor de fallback fue rotado el 2026-05-08
    # (incidencia: filtración del secreto en el historial git).
    secret: ${JWT_SECRET:dev-only-staffflow-2026-05-08-NOT-FOR-PRODUCTION-pad01}
    # Validez del token en milisegundos. 43200000 = 12 horas.
    # 12h cubre una jornada laboral con descanso de comida.
    # Refresh token queda como mejora para v2.0.
    expiration-ms: 43200000
