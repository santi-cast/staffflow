spring:
  datasource:
    url: jdbc:mysql://localhost:3306/staffflow?useSSL=false&serverTimezone=Europe/Madrid&allowPublicKeyRetrieval=true&sslMode=DISABLED
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Europe/Madrid
  jackson:
    serialization:
      write-dates-as-timestamps: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

staffflow:
  mail:
    from: ${MAIL_USERNAME}
    reset-url: staffflow://reset-password?token=
  jwt:
    secret: staffflow-secret-key-para-desarrollo-minimo-32-caracteres
    # Validez del token en milisegundos. 43200000 = 12 horas (decision de diseno 18 -- D-024).
    # 12h cubre jornadas ordinarias y extraordinarias incluyendo pausas largas.
    # Refresh token queda como mejora para v2.0.
    expiration-ms: 43200000
